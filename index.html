<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="./favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="theme-color" content="#0A4F33" />
    <meta name="msapplication-TileColor" content="#0A4F33" />
    <meta name="msapplication-TileImage" content="./icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PahadLink - Pure Himalayan Goods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        font-family: Outfit, Manrope, system-ui, sans-serif;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .boot-loader.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-loader__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0;
        padding: 24px;
      }

      .boot-loader__logo {
        display: block;
        width: min(240px, 70vw);
        height: auto;
        margin: 0 0 24px;
      }

      .boot-loader__bar {
        width: 112px;
        height: 3px;
        border-radius: 999px;
        background: #f0e4ea;
        overflow: hidden;
      }

      .boot-loader__bar span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: #e62978;
        animation: bootBar 1.1s ease-in-out infinite;
      }

      @keyframes bootBar {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-loader,
        .boot-loader.is-done {
          transition: opacity 0.15s ease, visibility 0.15s ease;
        }

        .boot-loader__bar span {
          animation: none;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" class="boot-loader" role="status" aria-live="polite" aria-busy="true">
      <div class="boot-loader__inner">
        <img class="boot-loader__logo" src="./logo.png" alt="PahadLink" width="260" height="66" />
        <div class="boot-loader__bar" aria-hidden="true">
          <span></span>
        </div>
      </div>
      <span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
        Loading PahadLink
      </span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
