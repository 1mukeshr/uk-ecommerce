# One-click: https://render.com/deploy?repo=https://github.com/1mukeshr/pahadlink
# Or: Render → New → Blueprint → connect this repo
#
# Required env on Render:
#   MONGODB_URI = mongodb+srv://USER:PASS@CLUSTER.mongodb.net/Pahadi_link?retryWrites=true&w=majority
#   ADMIN_PASSWORD = (your admin password)
#
# After deploy, copy the service URL and set GitHub Actions secret:
#   VITE_API_URL = https://YOUR-SERVICE.onrender.com/api
services:
  - type: web
    name: pahadlink-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: npm run start:api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Optional Atlas URI. If omitted / unreachable, API uses file DB fallback.
      - key: MONGODB_URI
        sync: false
      - key: USE_FILE_DB
        value: "true"
      - key: ALLOW_FILE_DB_FALLBACK
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://1mukeshr.github.io
      - key: ADMIN_EMAIL
        value: admin@pahadlink.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ORDER_NOTIFY_EMAIL
        value: admin@pahadlink.com
