# One-click: https://render.com/deploy?repo=https://github.com/1mukeshr/pahadlink
# Or: Render → New → Blueprint → connect this repo
#
# Required env on Render:
#   MONGODB_URI = mongodb+srv://USER:PASS@pahadlink.wkkq5n2.mongodb.net/?appName=pahadlink
#   ADMIN_PASSWORD = (your admin password)
#
# After deploy, copy the service URL and keep public/runtime-config.json apiUrl in sync.
services:
  - type: web
    name: pahadlink-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: npm run start:api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Atlas URI is a Render secret — never commit real credentials.
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: Pahadi_link
      - key: USE_FILE_DB
        value: "false"
      - key: ALLOW_FILE_DB_FALLBACK
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://1mukeshr.github.io/pahadlink
      - key: ADMIN_EMAIL
        value: admin@pahadlink.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ORDER_NOTIFY_EMAIL
        value: admin@pahadlink.com
